name: Publish to npm

on:
  push:
    branches: [main]

# The commit-the-bump step pushes the release back to main, so the job needs
# write access to repo contents.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip CI-triggered commits to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Bump to the next patch ABOVE whatever npm already has, so the published
      # version is always fresh even if the repo's package.json drifted behind
      # the registry (the previous setup never committed the bump back, so it
      # got stuck re-publishing the same version).
      - name: Bump version above the npm latest
        run: |
          PKG=$(node -p "require('./package.json').name")
          LATEST=$(npm view "$PKG" version 2>/dev/null || echo "0.0.0")
          npm version "$LATEST" --no-git-tag-version --allow-same-version >/dev/null 2>&1 || true
          npm version patch --no-git-tag-version
          echo "NEW_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Persist the bump so the repo tracks the registry and the next run starts
      # from the right place. [skip ci] avoids re-triggering this workflow.
      - name: Commit the version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "release: v${NEW_VERSION} [skip ci]" || exit 0
          git push origin HEAD:main

     
